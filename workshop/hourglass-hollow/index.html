<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass Hollow MMO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div class="row">
      <div>HP <span id="hp">200</span>/<span id="maxHp">200</span></div>
      <div>LV <span id="level">1</span></div>
      <div>XP <span id="xp">0</span>/<span id="nextXp">45</span></div>
      <div>ATK <span id="atk">28</span></div>
      <div>온라인 <span id="onlineCount">1</span></div>
      <div>구역 <span id="zone">필드</span></div>
      <div>남은 시간 <span id="time">14:00</span></div>
    </div>
    <div class="row">
      <div>퀘스트: <span id="quest">R-7과 대화(E)</span></div>
      <div>남은 적: <span id="enemyCount">0</span></div>
      <div>던전: 북쪽 폐허 포털 진입</div>
    </div>
    <div class="row controls">WASD 이동 · Shift 질주 · Space 공격 · Q 광역기 · F 비행 · E 상호작용/포털 · M 스캔</div>
  </div>

  <div id="msg"></div>
  <div id="crosshair"></div>
  <div id="gameOver" class="hidden">
    <h1 id="gameOverTitle"></h1>
    <p id="gameOverDesc"></p>
    <button id="restartBtn">다시 시작</button>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="game3d.js"></script>
</body>
</html>
