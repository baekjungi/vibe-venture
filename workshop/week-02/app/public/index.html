<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>🍱 학교 급식 정보 검색</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍱%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- 배경 장식 -->
  <div class="bg-decoration">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="container">
    <header>
      <button id="theme-toggle" class="theme-toggle" type="button" title="테마 전환" aria-label="테마 전환">
        <span class="theme-icon">🌙</span>
      </button>
      <h1>🍱 학교 급식 정보</h1>
      <p class="subtitle">지역 · 학교 · 날짜를 선택하면 급식 메뉴를 알려드려요</p>
    </header>

    <!-- 즐겨찾기 학교 빠른 선택 -->
    <div id="favorites-bar" class="favorites-bar hidden">
      <span class="favorites-label">⭐ 즐겨찾기</span>
      <div id="favorites-list" class="favorites-list"></div>
    </div>

    <!-- 3단계 선택 위저드 -->
    <div class="wizard">
      <!-- Step 1: 지역 -->
      <div class="step" id="step-region">
        <div class="step-header">
          <span class="step-badge">1</span>
          <h2>지역 선택</h2>
        </div>
        <div class="step-body">
          <select id="region-select">
            <option value="">-- 시·도 교육청을 선택하세요 --</option>
          </select>
        </div>
      </div>

      <!-- Step 2: 학교 -->
      <div class="step disabled" id="step-school">
        <div class="step-header">
          <span class="step-badge">2</span>
          <h2>학교 선택</h2>
          <span class="step-count" id="school-count"></span>
        </div>
        <div class="step-body">
          <div class="search-wrap">
            <input
              type="text"
              id="school-search"
              placeholder="학교 이름으로 검색..."
              autocomplete="off"
              disabled
            />
          </div>
          <div id="school-list-wrap">
            <div class="hint">지역을 먼저 선택해 주세요</div>
          </div>
        </div>
      </div>

      <!-- Step 3: 날짜 -->
      <div class="step disabled" id="step-date">
        <div class="step-header">
          <span class="step-badge">3</span>
          <h2>날짜 선택</h2>
        </div>
        <div class="step-body">
          <!-- 일간/주간 토글 -->
          <div class="mode-toggle">
            <button class="mode-btn active" id="mode-day" type="button">📅 일간</button>
            <button class="mode-btn" id="mode-week" type="button">📆 주간</button>
          </div>
          <div class="date-row">
            <button id="prev-date-btn" class="nav-date-btn" type="button" title="이전" aria-label="이전 날짜">‹</button>
            <input type="date" id="date-input" disabled />
            <button id="next-date-btn" class="nav-date-btn" type="button" title="다음" aria-label="다음 날짜">›</button>
          </div>
          <button id="search-btn" disabled>
            <span class="btn-icon">🔍</span> 급식 조회
          </button>
          <div id="week-range-label" class="week-range-label hidden"></div>
          <div class="keyboard-hint">💡 <kbd>Enter</kbd>로 빠르게 조회 · <kbd>←</kbd>/<kbd>→</kbd>로 날짜 이동</div>
        </div>
      </div>
    </div>

    <!-- 선택 요약 -->
    <div id="selection-summary" class="selection-summary hidden"></div>

    <!-- 결과 -->
    <section id="result" class="result-section hidden">
      <div class="result-header">
        <h2 id="result-title"></h2>
        <div class="result-actions">
          <button id="print-btn" class="action-btn" type="button" title="인쇄">🖨️</button>
          <button id="share-btn" class="action-btn" type="button" title="링크 복사">🔗</button>
        </div>
      </div>
      <div id="meal-cards"></div>

      <!-- 알레르기 범례 -->
      <details class="allergy-legend" id="allergy-legend">
        <summary>🥚 알레르기 정보 범례 보기</summary>
        <div class="allergy-grid" id="allergy-grid"></div>
      </details>
    </section>

    <!-- 로딩 / 오류 -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>급식 정보를 가져오는 중...</span>
    </div>
    <div id="error-msg" class="error-msg hidden"></div>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast hidden"></div>

    <!-- 음식 이미지 모달 -->
    <div id="food-modal" class="food-modal hidden" role="dialog" aria-modal="true" aria-labelledby="food-modal-title">
      <div class="food-modal-backdrop"></div>
      <div class="food-modal-card">
        <button class="food-modal-close" id="food-modal-close" aria-label="닫기">✕</button>
        <div class="food-modal-img-wrap">
          <img id="food-modal-img" src="" alt="" />
          <div id="food-modal-spinner" class="food-modal-spinner">⏳</div>
        </div>
        <div class="food-modal-info">
          <h3 id="food-modal-title"></h3>
          <p class="food-modal-disclaimer">🤖 AI가 생성한 이미지로 실제와 다를 수 있습니다</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>NEIS Open API · 데이터 출처: 나이스 교육정보 개방 포털</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
