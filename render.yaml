services:
  - type: web
    name: school-meal-app
    runtime: node
    rootDir: workshop/week-02/app
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NEIS_API_KEY
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api/regions
    autoDeploy: true

  - type: web
    name: hourglass-hollow
    runtime: node
    rootDir: workshop/hourglass-hollow
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8766
    autoDeploy: true
